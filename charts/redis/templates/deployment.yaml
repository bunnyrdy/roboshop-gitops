apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels: { app: redis, project: roboshop, tier: db }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis, project: roboshop, tier: db }
  template:
    metadata:
      labels: { app: redis, project: roboshop, tier: db }
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
