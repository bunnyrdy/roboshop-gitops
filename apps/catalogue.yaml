apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalogue
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bunnyrdy/roboshop-gitops.git
    targetRevision: main
    path: charts/catalogue-deploy/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: roboshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
